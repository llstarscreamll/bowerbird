root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/main"
cmd = "go build -o ./tmp/main ./cmd/api"
delay = 1000
exclude_dir = ["bin", "tmp", "vendor", "testdata", "node_modules"]
exclude_regex = ["_test.go"]
include_ext = ["go", "tpl", "tmpl", "html", "env"]
stop_on_error = true

[color]
app = "green"
build = "yellow"
main = "magenta"
runner = "cyan"

[log]
time = true

[misc]
clean_on_exit = true
