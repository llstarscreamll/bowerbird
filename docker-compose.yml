services:
  postgres:
    image: postgres:16-alpine
    container_name: bowerbird-postgres
    environment:
      POSTGRES_USER: bowerbird
      POSTGRES_PASSWORD: bowerbird
      POSTGRES_DB: bowerbird
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bowerbird -d bowerbird']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bowerbird-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data

  localstack:
    image: localstack/localstack:3.8
    container_name: bowerbird-localstack
    environment:
      SERVICES: s3,sqs,ssm,events
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DEBUG: 1
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack
      - ./apps/backend/scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
      - ./apps/backend/secrets.json:/tmp/local-secrets.json:ro

  caddy:
    image: caddy:2-alpine
    container_name: bowerbird-caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  caddy_data:
  caddy_config:
